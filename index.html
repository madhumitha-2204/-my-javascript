<!DOCTYPE html>
<html>
<head>
  <title>Working App</title>
</head>
<body>

  <h2>Click Button 👇</h2>
  <button onclick="runApp()">Click Me</button>

  <div id="output"></div>

  <script>
    function runApp() {

      let nums = [10, 20];

      // Spread
      let newNums = [...nums, 30];

      console.log("Array:", newNums);

      function process(data, callback) {
        callback(data);
      }

      let result = "";

      process(newNums, function(data) {

        data.forEach((num, index) => {

          // Destructuring
          let [value] = [num];

          // Template literal
          let text = `${index + 1} value is ${value}`;

          console.log(text);

          result += "<p>" + text + "</p>";
        });

      });

      document.getElementById("output").innerHTML = result;
    }
  </script>

</body>
</html>
